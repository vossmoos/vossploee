# Optional: override VOSSPLOEE_AGENT_MODEL for architect/implementer in this capability.
# model = "gpt-4o"

# Qualified tool ids (namespace.tool). Other capabilities can reuse entries, e.g. "core.imap".
tools = ["core.imap", "core.queue_delete", "core.queue_defer"]

# Mail endpoints for the core.imap tool — SSL. The tool only sends mail (SMTP); host/port below
# document Zoho IMAP for reference. Secrets are not stored here: set env vars per user_env / password_env.
[imap]
host = "imappro.zoho.eu"
port = 993
smtp_host = "smtppro.zoho.eu"
smtp_port = 465
user_env = "VOSSPLOEE_CORE_IMAP_USER"
password_env = "VOSSPLOEE_CORE_IMAP_PASSWORD"
